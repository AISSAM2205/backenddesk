# ─────────────────────────────────────────────────────────────────────────
# OVERRIDE LOCAL À CE PC (perso, hors réseau entreprise) — NON packagé.
#
# Spring Boot lit ./config/application.properties du dossier de lancement EN
# PRIORITÉ sur le classpath, et assez tôt pour activer un profil. On force ici
# le profil `dev` → application-dev.properties exclut l'auto-config OAuth2 →
# AUCUN appel à keycloak-interne-rct… → plus jamais d'UnknownHostException.
#
# Ce fichier vit DANS le dossier de travail, PAS dans src/main/resources : il
# n'est ni packagé dans le jar, ni partagé. Le PC PRO (qui ne l'a pas) garde
# le comportement par défaut → Keycloak actif. Rien n'est cassé côté entreprise.
# ─────────────────────────────────────────────────────────────────────────
spring.profiles.active=dev
