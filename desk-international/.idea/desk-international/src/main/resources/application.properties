
spring.application.name=awb-desk-international


spring.datasource.url=jdbc:postgresql://localhost:5432/trading_db
spring.datasource.username=postgres
spring.datasource.password=mohssine20
spring.datasource.driver-class-name=org.postgresql.Driver


spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=AWB-HikariPool


spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false


server.port=8081
# context-path removed — controllers already use /api/** prefix
# 8080 squatté par "ApplicationWebServer" (service tiers) → backend déplacé sur 8081


logging.level.root=INFO
logging.level.ma.attijariwafa.desk=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.flywaydb=INFO


springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operations-sorter=alpha


# ── Sécurité : Keycloak (resource server JWT) ────────────────────────
# Issuer = BASE/realms/<realm>. Le décodeur récupère la clé publique (JWKS)
# via /.well-known à la 1re requête → pas d'échec au démarrage hors réseau.
# NB : le backend doit aussi joindre Keycloak (réseau interne / VPN).
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://keycloak-interne-rct.attijariwafa.net/realms/sdm_services_store


# ── Données de marché temps réel ─────────────────────────────────────
# Source du flux : simulated (défaut) | bloomberg | kafka
# Le passage en production se fait ici, sans toucher au code ni au front.
marketdata.provider=simulated
# Cadence de diffusion des ticks (ms) — 800 ms = rendu fluide sans saturer le WS
marketdata.tick-interval-ms=800