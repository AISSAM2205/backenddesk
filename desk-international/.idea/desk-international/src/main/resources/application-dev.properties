# ── Profil LOCAL "dev" (PC perso, hors réseau entreprise) ─────────────────────
# Exclut l'auto-configuration OAuth2 Resource Server : le issuer-uri Keycloak de
# application.properties est alors IGNORÉ et aucun JwtDecoder n'est créé au
# démarrage → plus de java.net.UnknownHostException sur keycloak-interne-rct.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

# Données de marché simulées (déjà le défaut, explicité ici).
marketdata.provider=simulated

# Console propre : coupe le flot de requêtes SQL Hibernate (mis à DEBUG dans
# application.properties). Le PC pro (profil dev inactif) garde sa config.
logging.level.org.hibernate.SQL=WARN
